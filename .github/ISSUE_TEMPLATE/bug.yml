name: Bug report
description: Report a defect in squawk
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please fill out the sections below so the issue is reproducible.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the bug, and what did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps, code, or commands to reproduce. The smaller the example, the better.
      placeholder: |
        1. Call `getAirportByIcao('KBOS')`
        2. Observe `runways` is empty when it should contain 04L/22R
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the codebase is affected?
      options:
        - apps/atlas
        - packages/libs/mcp
        - packages/libs (other)
        - tools/build-* (data tooling)
        - repo / CI / build
        - unsure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Package version or commit SHA, if applicable.
      placeholder: e.g. @squawk/mcp@0.4.2 or commit abc1234
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, browser if relevant.
      placeholder: |
        Node: 22.10.0
        OS: macOS 14
        Browser: Chrome 131 (atlas only)
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Logs, screenshots, related issues or PRs.

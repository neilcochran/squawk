<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squawk Map Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #map {
        width: 100%;
        height: 100vh;
      }
      .controls {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 1000;
        background: white;
        padding: 12px;
        border-radius: 6px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        max-width: 300px;
        font-size: 13px;
        max-height: calc(100vh - 20px);
        overflow-y: auto;
      }
      .controls h3 {
        margin-bottom: 8px;
        font-size: 14px;
      }
      .controls h4 {
        margin-top: 10px;
        margin-bottom: 4px;
        font-size: 13px;
        color: #333;
        border-top: 1px solid #eee;
        padding-top: 8px;
      }
      .controls label {
        display: block;
        margin: 3px 0;
        cursor: pointer;
      }
      .controls input[type='checkbox'] {
        margin-right: 6px;
      }
      .controls .search {
        width: 100%;
        padding: 4px 8px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 3px;
      }
      .controls .stats {
        margin-top: 8px;
        color: #666;
        font-size: 12px;
      }
      .popup-content {
        font-size: 12px;
        line-height: 1.5;
      }
      .popup-content strong {
        display: inline-block;
        min-width: 70px;
      }
      .swatch {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 2px;
        margin-left: 4px;
        vertical-align: middle;
      }
      .section-hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div class="controls">
      <h3>Squawk Map Viewer</h3>
      <input type="text" class="search" id="search" placeholder="Search by name, ID, or ICAO..." />
      <div id="layerControls"></div>
      <div id="airspaceFilters" class="section-hidden">
        <h4>Airspace Types</h4>
        <div id="airspaceTypeFilters"></div>
      </div>
      <div id="airportFilters" class="section-hidden">
        <h4>Facility Types</h4>
        <div id="airportTypeFilters"></div>
      </div>
      <div class="stats" id="stats">Loading...</div>
    </div>

    <script>
      // ---- Color schemes ----
      const AIRSPACE_COLORS = {
        CLASS_B: '#0066cc',
        CLASS_C: '#9933cc',
        CLASS_D: '#3399ff',
        MOA: '#cc6600',
        RESTRICTED: '#cc0000',
        PROHIBITED: '#990000',
        WARNING: '#cc9900',
        ALERT: '#ff6600',
        NSA: '#666666',
      };

      const FACILITY_COLORS = {
        AIRPORT: '#2d8a4e',
        HELIPORT: '#7c3aed',
        SEAPLANE_BASE: '#0891b2',
        GLIDERPORT: '#ca8a04',
        ULTRALIGHT: '#ea580c',
        BALLOONPORT: '#dc2626',
      };

      // Minimum zoom level to show airport markers (avoids rendering 19k DOM elements).
      const AIRPORT_MIN_ZOOM = 7;

      // ---- Canvas renderer for performance ----
      const canvasRenderer = L.canvas({ padding: 0.5 });

      // ---- Map setup ----
      const map = L.map('map', { preferCanvas: true }).setView([39.5, -98.35], 5);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
        maxZoom: 18,
      }).addTo(map);

      // ---- State ----
      let airspaceFeatures = [];
      let airports = [];
      let airspaceLayer = null;
      let airportLayer = null;
      let activeAirspaceTypes = new Set(Object.keys(AIRSPACE_COLORS));
      let activeFacilityTypes = new Set(Object.keys(FACILITY_COLORS));
      let layerEnabled = { airspace: true, airports: true };
      let searchTerm = '';

      // ---- Airspace rendering ----
      function getAirspaceStyle(feature) {
        const type = feature.properties?.type ?? 'UNKNOWN';
        const color = AIRSPACE_COLORS[type] ?? '#888888';
        return {
          color: color,
          weight: 1.5,
          opacity: 0.8,
          fillColor: color,
          fillOpacity: 0.15,
        };
      }

      function formatAltitude(bound) {
        if (!bound) return '?';
        if (bound.reference === 'SFC') return 'SFC';
        if (bound.valueFt === 99999) return 'UNL';
        if (bound.valueFt >= 18000 && bound.reference === 'MSL') {
          return 'FL' + bound.valueFt / 100;
        }
        return bound.valueFt + ' ' + bound.reference;
      }

      function onAirspaceFeature(feature, layer) {
        const p = feature.properties ?? {};
        const coords = feature.geometry?.coordinates?.[0] ?? [];
        const html = `
          <div class="popup-content">
            <strong>Type:</strong> ${p.type}<br>
            <strong>Name:</strong> ${p.name}<br>
            <strong>ID:</strong> ${p.identifier}<br>
            <strong>Floor:</strong> ${formatAltitude(p.floor)}<br>
            <strong>Ceiling:</strong> ${formatAltitude(p.ceiling)}<br>
            <strong>State:</strong> ${p.state ?? 'N/A'}<br>
            <strong>Facility:</strong> ${p.controllingFacility ?? 'N/A'}<br>
            <strong>Coords:</strong> ${coords.length} points<br>
            ${p.scheduleDescription ? '<strong>Schedule:</strong> ' + p.scheduleDescription.substring(0, 200) : ''}
          </div>
        `;
        layer.bindPopup(html, { maxWidth: 350 });
      }

      function airspaceFilter(feature) {
        const type = feature.properties?.type ?? '';
        if (!activeAirspaceTypes.has(type)) return false;
        if (searchTerm) {
          const name = (feature.properties?.name ?? '').toLowerCase();
          const id = (feature.properties?.identifier ?? '').toLowerCase();
          if (!name.includes(searchTerm) && !id.includes(searchTerm)) return false;
        }
        return true;
      }

      // ---- Airport rendering ----
      function buildAirportPopup(apt) {
        let html = `<div class="popup-content">`;
        html += `<strong>Name:</strong> ${apt.nm}<br>`;
        html += `<strong>FAA ID:</strong> ${apt.id}`;
        if (apt.icao) html += ` / <strong>ICAO:</strong> ${apt.icao}`;
        html += `<br>`;
        html += `<strong>Type:</strong> ${apt.ft}<br>`;
        html += `<strong>City:</strong> ${apt.city}, ${apt.state}<br>`;
        if (apt.elev !== undefined) html += `<strong>Elevation:</strong> ${apt.elev} ft MSL<br>`;
        if (apt.twr) html += `<strong>Tower:</strong> ${apt.twr}<br>`;
        if (apt.fuel) html += `<strong>Fuel:</strong> ${apt.fuel}<br>`;

        if (apt.rwys && apt.rwys.length > 0) {
          html += `<strong>Runways:</strong><br>`;
          for (const rwy of apt.rwys) {
            html += `&nbsp;&nbsp;${rwy.id}`;
            if (rwy.len) html += ` - ${rwy.len}x${rwy.w ?? '?'} ft`;
            if (rwy.sfc) html += ` (${rwy.sfc})`;
            html += `<br>`;
          }
        }

        if (apt.freqs && apt.freqs.length > 0) {
          const shown = apt.freqs.slice(0, 8);
          html += `<strong>Frequencies:</strong><br>`;
          for (const f of shown) {
            html += `&nbsp;&nbsp;${f.f} MHz - ${f.u}`;
            if (f.s) html += ` (${f.s})`;
            html += `<br>`;
          }
          if (apt.freqs.length > 8) {
            html += `&nbsp;&nbsp;<em>...and ${apt.freqs.length - 8} more</em><br>`;
          }
        }

        html += `</div>`;
        return html;
      }

      function airportFilter(apt) {
        if (!activeFacilityTypes.has(apt.ft)) return false;
        if (searchTerm) {
          const name = (apt.nm ?? '').toLowerCase();
          const id = (apt.id ?? '').toLowerCase();
          const icao = (apt.icao ?? '').toLowerCase();
          const city = (apt.city ?? '').toLowerCase();
          if (
            !name.includes(searchTerm) &&
            !id.includes(searchTerm) &&
            !icao.includes(searchTerm) &&
            !city.includes(searchTerm)
          ) {
            return false;
          }
        }
        return true;
      }

      /**
       * Returns airports visible in the current map bounds that pass the
       * active type and search filters.
       */
      function getVisibleAirports() {
        const bounds = map.getBounds();
        return airports.filter((apt) => {
          if (!airportFilter(apt)) return false;
          return bounds.contains([apt.lat, apt.lon]);
        });
      }

      // ---- Render ----
      function renderAirspace() {
        if (airspaceLayer) {
          map.removeLayer(airspaceLayer);
          airspaceLayer = null;
        }
        if (!layerEnabled.airspace || airspaceFeatures.length === 0) return;

        airspaceLayer = L.geoJSON(airspaceFeatures, {
          style: getAirspaceStyle,
          onEachFeature: onAirspaceFeature,
          filter: airspaceFilter,
          renderer: canvasRenderer,
        }).addTo(map);
      }

      function renderAirports() {
        if (airportLayer) {
          map.removeLayer(airportLayer);
          airportLayer = null;
        }
        if (!layerEnabled.airports || airports.length === 0) return;

        const zoom = map.getZoom();

        // When searching, always show results regardless of zoom.
        // Otherwise require minimum zoom to avoid rendering 19k markers.
        if (!searchTerm && zoom < AIRPORT_MIN_ZOOM) return;

        const visible = getVisibleAirports();
        airportLayer = L.layerGroup();

        for (const apt of visible) {
          const color = FACILITY_COLORS[apt.ft] ?? '#888888';
          const marker = L.circleMarker([apt.lat, apt.lon], {
            renderer: canvasRenderer,
            radius: zoom >= 10 ? 5 : 4,
            fillColor: color,
            color: '#ffffff',
            weight: 1.5,
            opacity: 1,
            fillOpacity: 0.9,
          });
          marker.bindPopup(buildAirportPopup(apt), { maxWidth: 400 });
          airportLayer.addLayer(marker);
        }
        airportLayer.addTo(map);
      }

      let renderTimer = null;

      function scheduleRender() {
        if (renderTimer) clearTimeout(renderTimer);
        renderTimer = setTimeout(render, 50);
      }

      function render() {
        renderAirspace();
        renderAirports();
        updateStats();
      }

      function updateStats() {
        const parts = [];
        if (layerEnabled.airspace && airspaceFeatures.length > 0) {
          const visible = airspaceFeatures.filter(airspaceFilter).length;
          parts.push(`Airspace: ${visible}/${airspaceFeatures.length}`);
        }
        if (layerEnabled.airports && airports.length > 0) {
          const zoom = map.getZoom();
          if (!searchTerm && zoom < AIRPORT_MIN_ZOOM) {
            parts.push(`Airports: zoom in to see (${airports.length} total)`);
          } else {
            const visible = getVisibleAirports().length;
            const total = airports.filter(airportFilter).length;
            parts.push(`Airports: ${visible} visible (${total} match)`);
          }
        }
        document.getElementById('stats').textContent = parts.join(' | ') || 'No data loaded';
      }

      // Re-render airports on zoom/pan since we only show those in view.
      map.on('moveend', () => {
        if (layerEnabled.airports && airports.length > 0) {
          renderAirports();
          updateStats();
        }
      });

      // ---- Controls ----
      function buildLayerControls(config) {
        const container = document.getElementById('layerControls');
        const layerNames = { airspace: 'Airspace', airports: 'Airports' };

        for (const [name, enabled] of Object.entries(config.layers)) {
          if (!enabled) continue;
          const label = document.createElement('label');
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = true;
          cb.addEventListener('change', () => {
            layerEnabled[name] = cb.checked;
            render();
          });
          label.appendChild(cb);
          label.appendChild(document.createTextNode(layerNames[name] ?? name));
          container.appendChild(label);
        }
      }

      function buildAirspaceTypeFilters() {
        const section = document.getElementById('airspaceFilters');
        const container = document.getElementById('airspaceTypeFilters');
        if (airspaceFeatures.length === 0) return;

        section.classList.remove('section-hidden');
        const counts = {};
        for (const f of airspaceFeatures) {
          const t = f.properties?.type ?? 'UNKNOWN';
          counts[t] = (counts[t] ?? 0) + 1;
        }
        container.innerHTML = '';
        for (const [type, count] of Object.entries(counts).sort()) {
          const label = document.createElement('label');
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = true;
          cb.addEventListener('change', () => {
            if (cb.checked) activeAirspaceTypes.add(type);
            else activeAirspaceTypes.delete(type);
            render();
          });
          const color = AIRSPACE_COLORS[type] ?? '#888';
          label.appendChild(cb);
          label.appendChild(document.createTextNode(`${type} (${count}) `));
          const swatch = document.createElement('span');
          swatch.className = 'swatch';
          swatch.style.background = color;
          label.appendChild(swatch);
          container.appendChild(label);
        }
      }

      function buildAirportTypeFilters() {
        const section = document.getElementById('airportFilters');
        const container = document.getElementById('airportTypeFilters');
        if (airports.length === 0) return;

        section.classList.remove('section-hidden');
        const counts = {};
        for (const apt of airports) {
          counts[apt.ft] = (counts[apt.ft] ?? 0) + 1;
        }
        container.innerHTML = '';
        for (const [type, count] of Object.entries(counts).sort()) {
          const label = document.createElement('label');
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = true;
          cb.addEventListener('change', () => {
            if (cb.checked) activeFacilityTypes.add(type);
            else activeFacilityTypes.delete(type);
            render();
          });
          const color = FACILITY_COLORS[type] ?? '#888';
          label.appendChild(cb);
          label.appendChild(document.createTextNode(`${type} (${count}) `));
          const swatch = document.createElement('span');
          swatch.className = 'swatch';
          swatch.style.background = color;
          label.appendChild(swatch);
          container.appendChild(label);
        }
      }

      // ---- Search (debounced) ----
      let searchTimer = null;
      document.getElementById('search').addEventListener('input', (e) => {
        if (searchTimer) clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
          searchTerm = e.target.value.toLowerCase().trim();
          render();
        }, 200);
      });

      // ---- Load data ----
      async function init() {
        try {
          const configRes = await fetch('/config');
          const config = await configRes.json();
          buildLayerControls(config);

          const loads = [];

          if (config.layers.airspace) {
            loads.push(
              fetch('/data/airspace')
                .then((r) => r.json())
                .then((data) => {
                  airspaceFeatures = data.features ?? [];
                  console.log(`Loaded ${airspaceFeatures.length} airspace features`);
                  if (data.properties) {
                    console.log('NASR cycle:', data.properties.nasrCycleDate);
                  }
                }),
            );
          }

          if (config.layers.airports) {
            loads.push(
              fetch('/data/airports')
                .then((r) => r.json())
                .then((data) => {
                  airports = data.records ?? [];
                  console.log(`Loaded ${airports.length} airports`);
                }),
            );
          }

          await Promise.all(loads);

          // Build filter controls before first render so UI is ready.
          buildAirspaceTypeFilters();
          buildAirportTypeFilters();

          // Defer first render to let the browser paint the controls.
          requestAnimationFrame(() => render());
        } catch (err) {
          document.getElementById('stats').textContent = 'Failed to load data: ' + err.message;
        }
      }

      init();
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squawk Map Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #map {
        width: 100%;
        height: 100vh;
      }
      .controls {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 1000;
        background: white;
        padding: 12px;
        border-radius: 6px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        max-width: 300px;
        font-size: 13px;
        max-height: calc(100vh - 20px);
        overflow-y: auto;
      }
      .controls h3 {
        margin-bottom: 8px;
        font-size: 14px;
      }
      .controls h4 {
        margin-top: 10px;
        margin-bottom: 4px;
        font-size: 13px;
        color: #333;
        border-top: 1px solid #eee;
        padding-top: 8px;
      }
      .controls label {
        display: block;
        margin: 3px 0;
        cursor: pointer;
      }
      .controls input[type='checkbox'] {
        margin-right: 6px;
      }
      .controls .search {
        width: 100%;
        padding: 4px 8px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 3px;
      }
      .controls .stats {
        margin-top: 8px;
        color: #666;
        font-size: 12px;
      }
      .popup-content {
        font-size: 12px;
        line-height: 1.5;
      }
      .popup-content strong {
        display: inline-block;
        min-width: 70px;
      }
      .swatch {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 2px;
        margin-left: 4px;
        vertical-align: middle;
      }
      .section-hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div class="controls">
      <h3>Squawk Map Viewer</h3>
      <input type="text" class="search" id="search" placeholder="Search by name, ID, or ICAO..." />
      <div id="layerControls"></div>
      <div id="airspaceFilters" class="section-hidden">
        <h4>Airspace Types</h4>
        <div id="airspaceTypeFilters"></div>
      </div>
      <div id="airportFilters" class="section-hidden">
        <h4>Facility Types</h4>
        <div id="airportTypeFilters"></div>
      </div>
      <div id="navaidFilters" class="section-hidden">
        <h4>Navaid Types</h4>
        <div id="navaidTypeFilters"></div>
      </div>
      <div id="fixFilters" class="section-hidden">
        <h4>Fix Use Codes</h4>
        <div id="fixTypeFilters"></div>
      </div>
      <div id="airwayFilters" class="section-hidden">
        <h4>Airway Types</h4>
        <div id="airwayTypeFilters"></div>
      </div>
      <div id="procedureFilters" class="section-hidden">
        <h4>Procedure Types</h4>
        <div id="procedureTypeFilters"></div>
      </div>
      <div class="stats" id="stats">Loading...</div>
    </div>

    <script type="module" src="/static/viewer.js"></script>
  </body>
</html>
